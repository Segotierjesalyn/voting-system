<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - Manage Announcements</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#f1f5f9; display:flex; }
    .sidebar { width:240px; background:#0038a8; color:white; min-height:100vh; }
    .sidebar a { display:block; padding:12px 20px; color:#cbd5e1; text-decoration:none; }
    .sidebar a.active { background:#1e3a8a; color:white; }
    .main { flex:1; padding:20px; }
    .card { background:white; border-radius:12px; padding:20px; margin-bottom:20px; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:8px; text-align:left; border-bottom:1px solid #ddd; }
    button { margin:2px; padding:6px 12px; border:none; border-radius:4px; cursor:pointer; }
    .add { background:#16a34a; color:white; }
    .edit { background:#3b82f6; color:white; }
    .delete { background:#dc2626; color:white; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index: 1000; }
    .modal-content { background:white; padding:20px; border-radius:12px; width:500px; }
    input, textarea { width:100%; padding:8px; margin:8px 0; border:1px solid #cbd5e1; border-radius:6px; }
  </style>
</head>
<body>

<div class="sidebar">
  <h2 style="padding:20px;"> VoteSecure</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="voters.html">Voter Management</a>
  <a href="candidates.html">Candidates</a>
  <a href="election-setup.html">Election Setup</a>
  <a href="positions.html">Positions</a>
  <a href="announcements.html" class="active">Announcements</a>
  <a href="results.html">Results</a>
</div>

<div class="main">
  <h1>Announcements (Admin Control)</h1>
  <div class="card">
    <button class="add" onclick="openModal()"> New Announcement</button>
    <table id="announcementTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Content</th>
          <th>Posted</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="5">Loading announcements...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Add Announcement</h3>
    <input type="hidden" id="announcementId">
    
    <label for="title">Title</label>
    <input type="text" id="title" placeholder="Enter title here...">
    
    <label for="content">Content</label>
    <textarea id="content" rows="4" placeholder="Enter content details..."></textarea>
    
    <div style="text-align: right; margin-top: 15px;">
      <button class="add" onclick="saveAnnouncement()">Save</button>
      <button onclick="closeModal()" style="background:#94a3b8; color:white;">Cancel</button>
    </div>
  </div>
</div>

<script>
  const token = localStorage.getItem('adminToken');
  if (!token) window.location.href = 'index.html';

  // GLOBAL CACHE STORAGE: Dito ise-save ang listahan para sa error-free Editing
  let allAnnouncements = [];

  // 1. FETCH ALL ANNOUNCEMENTS
  async function fetchAnnouncements() {
    try {
      const res = await fetch('/api/announcements', { 
        headers: { 'Authorization': `Bearer ${token}` } 
      });
      const announcements = await res.json();
      
      // I-save sa ating local variable cache
      allAnnouncements = announcements;

      const tbody = document.querySelector('#announcementTable tbody');
      tbody.innerHTML = '';
      
      if(announcements.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No announcements posted yet.</td></tr>';
        return;
      }

      announcements.forEach(a => {
        const row = tbody.insertRow();
        row.insertCell(0).innerText = a.id;
        row.insertCell(1).innerText = a.title;
        
        // Babasahin ang data field nang ligtas (content o body)
        const textContent = a.content || a.body || '';
        row.insertCell(2).innerText = textContent.substring(0,50) + (textContent.length > 50 ? '...' : '');
        row.insertCell(3).innerText = new Date(a.created_at || a.date_posted).toLocaleDateString();
        
        const cell = row.insertCell(4);
        cell.innerHTML = `
          <button class="edit" onclick="editAnnouncement(${a.id})">Edit</button>
          <button class="delete" onclick="deleteAnnouncement(${a.id})">Delete</button>
        `;
      });
    } catch (err) {
      console.error("Error fetching announcements:", err);
      document.querySelector('#announcementTable tbody').innerHTML = '<tr><td colspan="5" style="color:red; text-align:center;">Failed to load datasets.</td></tr>';
    }
  }

  // 2. FIXED EDIT FUNCTION (Gumagamit na ng Local Cache para hindi mag-fail)
  function editAnnouncement(id) {
    // Hanapin ang anunsyo sa ating allAnnouncements array list
    const announcement = allAnnouncements.find(a => a.id == id);
    
    if (!announcement) {
      alert("Error: Announcement data could not be located locally.");
      return;
    }

    // I-load ang mga detalye sa mga input fields
    document.getElementById('announcementId').value = announcement.id;
    document.getElementById('title').value = announcement.title || '';
    document.getElementById('content').value = announcement.content || announcement.body || '';
    
    // Buksan ang modal window
    document.getElementById('modalTitle').innerText = 'Edit Announcement';
    document.getElementById('modal').style.display = 'flex';
  }

  // 3. SAVE CHANGES (ADD OR UPDATE)
  async function saveAnnouncement() {
    const id = document.getElementById('announcementId').value;
    const titleVal = document.getElementById('title').value.trim();
    const contentVal = document.getElementById('content').value.trim();

    if (!titleVal || !contentVal) {
      alert("Please fill up both Title and Content fields.");
      return;
    }

    // Payload Schema: Pinapadala ang 'content' property (nakabase sa huli mong working structure)
    const data = {
      title: titleVal,
      content: contentVal 
    };

    const url = id ? `/api/announcements/${id}` : '/api/announcements';
    const method = id ? 'PUT' : 'POST';

    try {
      const res = await fetch(url, { 
        method: method, 
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': `Bearer ${token}`
        }, 
        body: JSON.stringify(data) 
      });

      if (res.ok) {
        closeModal();
        fetchAnnouncements(); // I-refresh ang listahan
        alert("Announcement successfully saved! Changes are now live on the voter side.");
      } else {
        const errorData = await res.json().catch(() => null);
        const serverError = errorData ? (errorData.error || errorData.message || JSON.stringify(errorData)) : `Status Code: ${res.status}`;
        alert(`Failed to save.\nServer Error: ${serverError}`);
      }
    } catch (err) {
      console.error("Network Error:", err);
      alert("Database connectivity lost. Check backend logs.");
    }
  }

  // 4. DELETE ANNOUNCEMENT
  async function deleteAnnouncement(id) {
    if (!confirm('Are you sure you want to permanently delete this announcement?')) return;
    try {
      const res = await fetch(`/api/announcements/${id}`, { 
        method: 'DELETE', 
        headers: { 'Authorization': `Bearer ${token}` } 
      });
      if (res.ok) {
        fetchAnnouncements();
        alert("Announcement deleted successfully.");
      } else {
        alert("Server rejected the deletion command.");
      }
    } catch (err) {
      console.error("Error deleting:", err);
    }
  }

  function openModal() {
    document.getElementById('announcementId').value = '';
    document.getElementById('title').value = '';
    document.getElementById('content').value = '';
    document.getElementById('modalTitle').innerText = 'Add Announcement';
    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  // Initial Execution
  fetchAnnouncements();
</script>
</body>
</html>
