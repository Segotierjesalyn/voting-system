<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Announcements</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#f1f5f9; display:flex; }
    .sidebar { width:240px; background:#0038a8; color:white; min-height:100vh; }
    .sidebar a { display:block; padding:12px 20px; color:#cbd5e1; text-decoration:none; }
    .sidebar a.active { background:#1e3a8a; color:white; }
    .main { flex:1; padding:20px; }
    .card { background:white; border-radius:12px; padding:20px; margin-bottom:20px; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:8px; text-align:left; border-bottom:1px solid #ddd; }
    button { margin:2px; padding:6px 12px; border:none; border-radius:4px; cursor:pointer; }
    .add { background:#16a34a; color:white; }
    .edit { background:#3b82f6; color:white; }
    .delete { background:#dc2626; color:white; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
    .modal-content { background:white; padding:20px; border-radius:12px; width:500px; }
    input, textarea { width:100%; padding:8px; margin:8px 0; }
  </style>
</head>
<body>
<div class="sidebar">
  <h2 style="padding:20px;"> VoteSecure</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="voters.html">Voter Management</a>
  <a href="candidates.html">Candidates</a>
  <a href="election-setup.html">Election Setup</a>
  <a href="positions.html">Positions</a>
  <a href="announcements.html" class="active">Announcements</a>
  <a href="results.html">Results</a>
</div>
<div class="main">
  <h1>Announcements</h1>
  <div class="card">
    <button class="add" onclick="openModal()"> New Announcement</button>
    <table id="announcementTable"><thead><tr><th>ID</th><th>Title</th><th>Content</th><th>Posted</th><th>Actions</th></tr></thead><tbody></tbody></table>
  </div>
</div>
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Add Announcement</h3>
    <input type="hidden" id="announcementId">
    <label>Title</label><input type="text" id="title">
    <label>Content</label><textarea id="content" rows="4"></textarea>
    <button class="add" onclick="saveAnnouncement()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>
<script>
  const token = localStorage.getItem('adminToken');
  if (!token) window.location.href = 'index.html';

  async function fetchAnnouncements() {
    const res = await fetch('/api/announcements', { headers: { 'Authorization': `Bearer ${token}` } });
    const announcements = await res.json();
    const tbody = document.querySelector('#announcementTable tbody');
    tbody.innerHTML = '';
    announcements.forEach(a => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = a.id;
      row.insertCell(1).innerText = a.title;
      row.insertCell(2).innerText = a.content.substring(0,50)+(a.content.length>50?'...':'');
      row.insertCell(3).innerText = new Date(a.created_at).toLocaleDateString();
      const cell = row.insertCell(4);
      cell.innerHTML = `<button class="edit" onclick="editAnnouncement(${a.id})">Edit</button>
                        <button class="delete" onclick="deleteAnnouncement(${a.id})">Delete</button>`;
    });
  }
  async function saveAnnouncement() {
    const id = document.getElementById('announcementId').value;
    const data = {
      title: document.getElementById('title').value,
      content: document.getElementById('content').value
    };
    const url = id ? `/api/announcements/${id}` : '/api/announcements';
    const method = id ? 'PUT' : 'POST';
    await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(data) });
    closeModal();
    fetchAnnouncements();
  }
  async function editAnnouncement(id) {
    const res = await fetch(`/api/announcements/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
    const a = await res.json();
    document.getElementById('announcementId').value = a.id;
    document.getElementById('title').value = a.title;
    document.getElementById('content').value = a.content;
    document.getElementById('modalTitle').innerText = 'Edit Announcement';
    document.getElementById('modal').style.display = 'flex';
  }
  async function deleteAnnouncement(id) {
    if (!confirm('Delete this announcement?')) return;
    await fetch(`/api/announcements/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
    fetchAnnouncements();
  }
  function openModal() {
    document.getElementById('announcementId').value = '';
    document.getElementById('title').value = '';
    document.getElementById('content').value = '';
    document.getElementById('modalTitle').innerText = 'Add Announcement';
    document.getElementById('modal').style.display = 'flex';
  }
  function closeModal() { document.getElementById('modal').style.display = 'none'; }
  fetchAnnouncements();
</script>
</body>
</html>
