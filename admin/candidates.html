<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Candidates</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#f1f5f9; display:flex; }
    .sidebar { width:240px; background:#0038a8; color:white; min-height:100vh; }
    .sidebar a { display:block; padding:12px 20px; color:#cbd5e1; text-decoration:none; }
    .sidebar a.active { background:#1e3a8a; color:white; }
    .main { flex:1; padding:20px; }
    .card { background:white; border-radius:12px; padding:20px; margin-bottom:20px; }
    table { width:100%; border-collapse:collapse; margin-top:15px; }
    th, td { padding:12px 8px; text-align:left; border-bottom:1px solid #ddd; }
    th { background:#f8fafc; font-weight:600; }
    button { margin:2px; padding:6px 12px; border:none; border-radius:4px; cursor:pointer; font-weight:500; }
    .add { background:#16a34a; color:white; }
    .edit { background:#3b82f6; color:white; }
    .delete { background:#dc2626; color:white; }
    .refresh { background:#fcdb30; color:#0038a8; }
    select, input { padding:8px; margin:5px 0; width:100%; border:1px solid #ccc; border-radius:6px; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; }
    .modal-content { background:white; padding:25px; border-radius:12px; width:450px; }
    .modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:15px; }
  </style>
</head>
<body>
<div class="sidebar">
  <h2 style="padding:20px;">🗳️ VoteSecure</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="voters.html">Voter Management</a>
  <a href="candidates.html" class="active">Candidates</a>
  <a href="election-setup.html">Election Setup</a>
  <a href="positions.html">Positions</a>
  <a href="ballot-design.html">Ballot Design</a>
  <a href="announcements.html">Announcements</a>
  <a href="results.html">Results</a>
</div>
<div class="main">
  <h1>Manage Candidates</h1>
  <div class="card">
    <label style="font-weight:bold;">Select Election</label>
    <select id="electionSelect"></select>
    
    <label style="font-weight:bold;">Select Position</label>
    <select id="positionSelect"></select>
    
    <div style="margin-top:10px; display:flex; gap:10px;">
      <button class="add" onclick="openModal()">➕ Add Candidate</button>
      <button class="refresh" onclick="loadCandidates()">🔄 Refresh</button>
    </div>
    
    <table id="candidateTable">
      <thead><tr><th>ID</th><th>Name</th><th>Party</th><th>Actions</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle" style="color:#0038a8; margin-bottom:15px;">Add Candidate</h3>
    <input type="hidden" id="candidateId">
    <label>Name</label><input type="text" id="candName" placeholder="e.g., Juan Dela Cruz">
    <label>Party</label><input type="text" id="candParty" placeholder="e.g., Partido ng Masa">
    <div class="modal-actions">
      <button style="background:#94a3b8; color:white;" onclick="closeModal()">Cancel</button>
      <button class="add" onclick="saveCandidate()">Save</button>
    </div>
  </div>
</div>

<script>
  const BASE_URL = 'http://localhost:3000';
  const token = localStorage.getItem('adminToken');
  if (!token) window.location.href = 'index.html';

  let currentElectionId = null;
  let currentPositionId = null;

  async function loadElections() {
    try {
      const res = await fetch(`${BASE_URL}/api/election`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) throw new Error('Failed to fetch elections');
      const elections = await res.json();
      const select = document.getElementById('electionSelect');
      select.innerHTML = '';
      if (!elections.length) {
        select.innerHTML = '<option value="">No elections – create one first</option>';
        return;
      }
      elections.forEach(e => {
        const opt = document.createElement('option');
        opt.value = e.id;
        opt.textContent = e.name;
        select.appendChild(opt);
      });
      currentElectionId = elections[0].id;
      await loadPositions();
      
      select.addEventListener('change', async () => {
        currentElectionId = select.value;
        await loadPositions();
      });
    } catch (err) {
      alert('Error loading elections: ' + err.message);
    }
  }

  async function loadPositions() {
    if (!currentElectionId) return;
    try {
      const res = await fetch(`${BASE_URL}/api/positions?election_id=${currentElectionId}`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) throw new Error('Failed to fetch positions');
      const positions = await res.json();
      const posSelect = document.getElementById('positionSelect');
      posSelect.innerHTML = '';
      if (!positions.length) {
        posSelect.innerHTML = '<option value="">No positions – add positions first</option>';
        currentPositionId = null;
        document.querySelector('#candidateTable tbody').innerHTML = '';
        return;
      }
      positions.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name;
        posSelect.appendChild(opt);
      });
      currentPositionId = parseInt(positions[0].id);
      await loadCandidates();
      
      posSelect.addEventListener('change', async () => {
        currentPositionId = parseInt(posSelect.value);
        await loadCandidates();
      });
    } catch (err) {
      alert('Error loading positions: ' + err.message);
    }
  }

  async function loadCandidates() {
    if (!currentPositionId) return;
    try {
      const res = await fetch(`${BASE_URL}/api/candidates/position/${currentPositionId}`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) throw new Error('Failed to fetch candidates');
      const candidates = await res.json();
      const tbody = document.querySelector('#candidateTable tbody');
      tbody.innerHTML = '';
      candidates.forEach(c => {
        const row = tbody.insertRow();
        row.insertCell(0).innerText = c.id;
        row.insertCell(1).innerText = c.full_name || c.name;
        row.insertCell(2).innerText = c.party || '';
        const cell = row.insertCell(3);
        cell.innerHTML = `<button class="edit" onclick="editCandidate(${c.id})">Edit</button>
                          <button class="delete" onclick="deleteCandidate(${c.id})">Delete</button>`;
      });
    } catch (err) {
      console.error(err);
      alert('Error loading candidates: ' + err.message);
    }
  }

  async function saveCandidate() {
    if (!currentElectionId || !currentPositionId) {
      alert('Please select an election and position first');
      return;
    }
    const id = document.getElementById('candidateId').value;
    const name = document.getElementById('candName').value.trim();
    const party = document.getElementById('candParty').value.trim();
    if (!name) {
      alert('Candidate name is required');
      return;
    }
    const data = {
      election_id: parseInt(currentElectionId),
      position_id: parseInt(currentPositionId),
      name: name,
      party: party
    };
    const url = id ? `${BASE_URL}/api/candidates/${id}` : `${BASE_URL}/api/candidates`;
    const method = id ? 'PUT' : 'POST';
    try {
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(data)
      });
      const result = await res.json();
      if (!res.ok) throw new Error(result.error || 'Save failed');
      closeModal();
      await loadCandidates();
    } catch (err) {
      alert('Error saving candidate: ' + err.message);
    }
  }

  async function editCandidate(id) {
    try {
      const res = await fetch(`${BASE_URL}/api/candidates/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) throw new Error('Failed to fetch candidate');
      const c = await res.json();
      document.getElementById('candidateId').value = c.id;
      document.getElementById('candName').value = c.full_name || c.name;
      document.getElementById('candParty').value = c.party || '';
      document.getElementById('modalTitle').innerText = 'Edit Candidate';
      document.getElementById('modal').style.display = 'flex';
    } catch (err) {
      alert('Error loading candidate details: ' + err.message);
    }
  }

  async function deleteCandidate(id) {
    if (!confirm('Delete this candidate?')) return;
    try {
      const res = await fetch(`${BASE_URL}/api/candidates/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) throw new Error(await res.text());
      await loadCandidates();
    } catch (err) {
      alert('Delete failed: ' + err.message);
    }
  }

  function openModal() {
    document.getElementById('candidateId').value = '';
    document.getElementById('candName').value = '';
    document.getElementById('candParty').value = '';
    document.getElementById('modalTitle').innerText = 'Add Candidate';
    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  loadElections();
</script>
</body>
</html>
