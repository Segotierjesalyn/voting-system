<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Candidates</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#f1f5f9; display:flex; }
    .sidebar { width:240px; background:#0038a8; color:white; min-height:100vh; }
    .sidebar a { display:block; padding:12px 20px; color:#cbd5e1; text-decoration:none; }
    .sidebar a.active { background:#1e3a8a; color:white; }
    .main { flex:1; padding:20px; }
    .card { background:white; border-radius:12px; padding:20px; margin-bottom:20px; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:8px; text-align:left; border-bottom:1px solid #ddd; }
    button { margin:2px; padding:6px 12px; border:none; border-radius:4px; cursor:pointer; }
    .add { background:#16a34a; color:white; }
    .edit { background:#3b82f6; color:white; }
    .delete { background:#dc2626; color:white; }
    .refresh { background:#fcdb30; color:#0038a8; }
    select, input { padding:5px; margin:5px 0; width:100%; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
    .modal-content { background:white; padding:20px; border-radius:12px; width:450px; }
  </style>
</head>
<body>
<div class="sidebar">
  <h2 style="padding:20px;">🗳️ VoteSecure</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="voters.html">Voter Management</a>
  <a href="candidates.html" class="active">Candidates</a>
  <a href="election-setup.html">Election Setup</a>
  <a href="positions.html">Positions</a>
  <a href="announcements.html">Announcements</a>
  <a href="results.html">Results</a>
</div>
<div class="main">
  <h1>Manage Candidates</h1>
  <div class="card">
    <label>Select Election</label>
    <select id="electionSelect"></select>
    <label>Select Position</label>
    <select id="positionSelect"></select>
    <button class="add" onclick="openModal()">➕ Add Candidate</button>
    <button class="refresh" onclick="loadCandidates()" style="margin-left:10px;">🔄 Refresh</button>
    <table id="candidateTable"><thead><tr><th>ID</th><th>Name</th><th>Party</th><th>Actions</th></tr></thead><tbody></tbody></table>
  </div>
</div>
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Add Candidate</h3>
    <input type="hidden" id="candidateId">
    <label>Name</label><input type="text" id="candName">
    <label>Party</label><input type="text" id="candParty">
    <button class="add" onclick="saveCandidate()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>
<script>
  const token = localStorage.getItem('adminToken');
  if (!token) window.location.href = 'index.html';
  let elections = [], positions = [];
  let currentElectionId = null, currentPositionId = null;

  async function loadElections() {
    const res = await fetch('/api/election', { headers: { 'Authorization': `Bearer ${token}` } });
    elections = await res.json();
    const select = document.getElementById('electionSelect');
    select.innerHTML = '';
    if (!elections.length) {
      select.innerHTML = '<option>No elections – go to Election Setup first</option>';
      return;
    }
    elections.forEach(e => {
      const opt = document.createElement('option');
      opt.value = e.id;
      opt.textContent = e.name;
      select.appendChild(opt);
    });
    currentElectionId = elections[0].id;
    await loadPositions();
    select.addEventListener('change', async () => {
      currentElectionId = select.value;
      await loadPositions();
    });
  }

  async function loadPositions() {
    const res = await fetch(`/api/positions?election_id=${currentElectionId}`, { headers: { 'Authorization': `Bearer ${token}` } });
    positions = await res.json();
    const posSelect = document.getElementById('positionSelect');
    posSelect.innerHTML = '';
    if (!positions.length) {
      posSelect.innerHTML = '<option>No positions – go to Positions page first</option>';
      return;
    }
    positions.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.title;
      posSelect.appendChild(opt);
    });
    currentPositionId = positions[0].id;
    await loadCandidates();
    posSelect.addEventListener('change', async () => {
      currentPositionId = posSelect.value;
      await loadCandidates();
    });
  }

  async function loadCandidates() {
    if (!currentPositionId) return;
    const res = await fetch(`/api/candidates/position/${currentPositionId}`, { headers: { 'Authorization': `Bearer ${token}` } });
    const candidates = await res.json();
    const tbody = document.querySelector('#candidateTable tbody');
    tbody.innerHTML = '';
    candidates.forEach(c => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = c.id;
      row.insertCell(1).innerText = c.name;
      row.insertCell(2).innerText = c.party || '';
      const cell = row.insertCell(3);
      cell.innerHTML = `<button class="edit" onclick="editCandidate(${c.id})">Edit</button>
                        <button class="delete" onclick="deleteCandidate(${c.id})">Delete</button>`;
    });
  }

  async function saveCandidate() {
    const id = document.getElementById('candidateId').value;
    const data = {
      election_id: currentElectionId,
      position_id: currentPositionId,
      name: document.getElementById('candName').value,
      party: document.getElementById('candParty').value
    };
    if (!data.name) { alert('Candidate name required'); return; }
    const url = id ? `/api/candidates/${id}` : '/api/candidates';
    const method = id ? 'PUT' : 'POST';
    await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(data) });
    closeModal();
    await loadCandidates();
  }

  async function editCandidate(id) {
    const res = await fetch(`/api/candidates/${id}`, { headers: { 'Authorization': `Bearer ${token}` } });
    const c = await res.json();
    document.getElementById('candidateId').value = c.id;
    document.getElementById('candName').value = c.name;
    document.getElementById('candParty').value = c.party || '';
    document.getElementById('modalTitle').innerText = 'Edit Candidate';
    document.getElementById('modal').style.display = 'flex';
  }

  async function deleteCandidate(id) {
    if (!confirm('Delete this candidate?')) return;
    await fetch(`/api/candidates/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
    await loadCandidates();
  }

  function openModal() {
    document.getElementById('candidateId').value = '';
    document.getElementById('candName').value = '';
    document.getElementById('candParty').value = '';
    document.getElementById('modalTitle').innerText = 'Add Candidate';
    document.getElementById('modal').style.display = 'flex';
  }
  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  loadElections();
</script>
</body>
</html>
