<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | VoteSecure PH</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f1f5f9;
      display: flex;
      min-height: 100vh;
    }
    /* Sidebar */
    .sidebar {
      width: 260px;
      background: linear-gradient(180deg, #0038a8 0%, #002266 100%);
      color: white;
      position: fixed;
      height: 100vh;
    }
    .sidebar-logo { padding: 1.5rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-logo h2 { font-size: 1.2rem; }
    .sidebar-menu { padding: 1rem 0; }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 1.5rem;
      color: #cbd5e1;
      text-decoration: none;
      transition: all 0.2s;
    }
    .menu-item:hover, .menu-item.active { background: rgba(255,255,255,0.1); color: white; border-left: 4px solid #fcdb30; }
    .sidebar-footer { position: absolute; bottom: 0; width: 100%; padding: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }
    .btn-logout { width: 100%; padding: 10px; background: #ce1126; color: white; border: none; border-radius: 8px; cursor: pointer; }
    /* Main */
    .main { margin-left: 260px; flex: 1; padding: 2rem; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .topbar h1 { color: #0038a8; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: white; border-radius: 12px; padding: 1.5rem; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .stat-number { font-size: 2rem; font-weight: bold; color: #1e3a8a; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .quick-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .action-btn { background: #e2e8f0; padding: 0.75rem 1.5rem; border-radius: 8px; text-decoration: none; color: #1e3a8a; font-weight: bold; transition: 0.2s; }
    .action-btn:hover { background: #cbd5e1; transform: translateY(-2px); }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><div style="font-size:32px;"></div><h2>VoteSecure PH</h2><p>Admin Panel</p></div>
  <div class="sidebar-menu">
    <a href="dashboard.html" class="menu-item active"> Dashboard</a>
    <a href="voters.html" class="menu-item"> Voter Management</a>
    <a href="candidates.html" class="menu-item"> Candidates</a>
    <a href="election-setup.html" class="menu-item"> Election Setup</a>
    <a href="positions.html" class="menu-item"> Positions</a>
    <a href="ballot-design.html" class="menu-item"> Ballot Design</a>   <!-- ADDED -->
    <a href="announcements.html" class="menu-item"> Announcements</a>
    <a href="results.html" class="menu-item"> Results</a>
  </div>
  <div class="sidebar-footer"><button class="btn-logout" onclick="logout()"> Logout</button></div>
</div>
<div class="main">
  <div class="topbar"><h1>Admin Dashboard</h1><p id="dateToday"></p></div>
  <div class="stats-grid" id="stats"></div>
  <div class="card">
    <h3> Quick Actions</h3>
    <div class="quick-actions">
      <a href="voters.html" class="action-btn"> Approve Voters</a>
      <a href="election-setup.html" class="action-btn"> Create Election</a>
      <a href="candidates.html" class="action-btn"> Add Candidate</a>
      <a href="ballot-design.html" class="action-btn"> Customize Ballot</a>   <!-- OPTIONAL: add quick action -->
      <a href="announcements.html" class="action-btn"> Post Announcement</a>
    </div>
  </div>
</div>
<script>
  const token = localStorage.getItem('adminToken');
  if (!token) window.location.href = 'index.html';

  document.getElementById('dateToday').innerText = new Date().toLocaleDateString('en-PH', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  async function loadStats() {
    try {
      const res = await fetch('/api/voters', { headers: { 'Authorization': `Bearer ${token}` } });
      const voters = await res.json();
      const total = voters.length;
      const pending = voters.filter(v => v.status === 'pending').length;
      const approved = voters.filter(v => v.status === 'approved').length;
      let votesCast = 0;
      try {
        const turnoutRes = await fetch('/api/results/turnout/1', { headers: { 'Authorization': `Bearer ${token}` } });
        const turnout = await turnoutRes.json();
        votesCast = turnout.votes_cast || 0;
      } catch(e) {}
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="stat-number">${total}</div><div>Total Voters</div></div>
        <div class="stat-card"><div class="stat-number">${pending}</div><div>Pending Approval</div></div>
        <div class="stat-card"><div class="stat-number">${approved}</div><div>Approved Voters</div></div>
        <div class="stat-card"><div class="stat-number">${votesCast}</div><div>Votes Cast</div></div>
      `;
    } catch(e) { console.error(e); document.getElementById('stats').innerHTML = '<div class="stat-card">Error loading stats</div>'; }
  }
  function logout() { localStorage.clear(); window.location.href = 'index.html'; }
  loadStats();
</script>
</body>
</html>
