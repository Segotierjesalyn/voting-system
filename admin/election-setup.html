<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Election Setup | Admin</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#f1f5f9; display:flex; }
    .sidebar { width:260px; background:#0038a8; color:white; min-height:100vh; }
    .sidebar-menu a { display:block; padding:12px 1.5rem; color:#cbd5e1; text-decoration:none; }
    .sidebar-menu a.active { background:rgba(255,255,255,0.2); color:white; }
    .main { flex:1; padding:2rem; }
    .card { background:white; border-radius:16px; padding:1.5rem; margin-bottom:1.5rem; }
    .toggle-switch { position:relative; display:inline-block; width:50px; height:24px; }
    .toggle-switch input { opacity:0; width:0; height:0; }
    .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#ccc; border-radius:24px; }
    .slider:before { position:absolute; content:""; height:18px; width:18px; left:3px; bottom:3px; background:white; border-radius:50%; transition:0.2s; }
    input:checked + .slider { background:#16a34a; }
    input:checked + .slider:before { transform:translateX(26px); }
    .election-item { display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid #e2e8f0; }
    .save-btn { background:#1e3a8a; color:white; padding:8px 20px; border:none; border-radius:8px; cursor:pointer; margin-top:1rem; }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><h2>🗳️ VoteSecure PH</h2><p>Admin Panel</p></div>
  <div class="sidebar-menu">
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="voters.html">👥 Voter Management</a>
    <a href="candidates.html">🧑‍💼 Candidates</a>
    <a href="election-setup.html" class="active">⚙️ Election Setup</a>
    <a href="results.html">📈 Results</a>
  </div>
</div>
<div class="main">
  <h1>Election Setup</h1>
  <div class="card" id="electionsCard"></div>
  <button class="save-btn" onclick="saveSettings()">💾 Save All Settings</button>
</div>
<script>
  const API = 'http://localhost:3000/api';
  let token = localStorage.getItem('adminToken');
  if(!token) window.location.href='index.html';

  let settings = {};

  async function loadSettings() {
    const res = await fetch(`${API}/election-settings`, { headers:{'Authorization':`Bearer ${token}`} });
    settings = await res.json();
    render();
  }

  function render() {
    const elections = [
      { key:'barangay', name:'Barangay & SK Elections' },
      { key:'municipal', name:'Municipal/City Elections' },
      { key:'provincial', name:'Provincial Elections' },
      { key:'national', name:'National Elections' }
    ];
    let html = '';
    elections.forEach(e => {
      let enabled = settings[e.key]?.enabled !== false;
      html += `
        <div class="election-item">
          <div><strong>${e.name}</strong><br><small>Users can vote if enabled</small></div>
          <label class="toggle-switch">
            <input type="checkbox" data-key="${e.key}" ${enabled ? 'checked' : ''}>
            <span class="slider"></span>
          </label>
        </div>
      `;
    });
    document.getElementById('electionsCard').innerHTML = html;
    // attach event listeners
    document.querySelectorAll('.toggle-switch input').forEach(cb => {
      cb.addEventListener('change', (e) => {
        const key = e.target.dataset.key;
        if(!settings[key]) settings[key] = {};
        settings[key].enabled = e.target.checked;
      });
    });
  }

  async function saveSettings() {
    try {
      const res = await fetch(`${API}/election-settings`, {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
        body:JSON.stringify(settings)
      });
      if(res.ok) alert('Settings saved. User side will update automatically.');
      else alert('Failed to save');
    } catch(e) { alert('Error saving'); }
  }

  loadSettings();
</script>
</body>
</html>
