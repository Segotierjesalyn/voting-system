<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Positions</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#f1f5f9; display:flex; }
    .sidebar { width:240px; background:#0038a8; color:white; min-height:100vh; }
    .sidebar a { display:block; padding:12px 20px; color:#cbd5e1; text-decoration:none; }
    .sidebar a.active { background:#1e3a8a; color:white; }
    .main { flex:1; padding:20px; }
    .card { background:white; border-radius:12px; padding:20px; margin-bottom:20px; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:8px; text-align:left; border-bottom:1px solid #ddd; }
    button { margin:2px; padding:6px 12px; border:none; border-radius:4px; cursor:pointer; }
    .add { background:#16a34a; color:white; }
    .edit { background:#3b82f6; color:white; }
    .delete { background:#dc2626; color:white; }
    select { padding:5px; margin-bottom:10px; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
    .modal-content { background:white; padding:20px; border-radius:12px; width:400px; }
    input, select { width:100%; padding:8px; margin:8px 0; }
  </style>
</head>
<body>
<div class="sidebar">
  <h2 style="padding:20px;">🗳️ VoteSecure</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="voters.html">Voter Management</a>
  <a href="candidates.html">Candidates</a>
  <a href="election-setup.html">Election Setup</a>
  <a href="positions.html" class="active">Positions</a>
  <a href="announcements.html">Announcements</a>
  <a href="results.html">Results</a>
</div>
<div class="main">
  <h1>Manage Positions</h1>
  <div class="card">
    <label>Select Election</label>
    <select id="electionSelect"></select>
    <button class="add" onclick="openModal()">➕ Add Position</button>
    <table id="positionTable"><thead><tr><th>ID</th><th>Title</th><th>Max Seats</th><th>Order</th><th>Actions</th></tr></thead><tbody></tbody></table>
  </div>
</div>
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Add Position</h3>
    <input type="hidden" id="positionId">
    <label>Title</label><input type="text" id="title">
    <label>Max Seats</label><input type="number" id="maxSeats" value="1">
    <label>Display Order</label><input type="number" id="displayOrder" value="0">
    <button class="add" onclick="savePosition()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>
<script>
  const token = localStorage.getItem('adminToken');
  if (!token) window.location.href = 'index.html';
  let elections = [];
  let currentElectionId = null;
  let positions = [];

  async function loadElections() {
    const res = await fetch('/api/election', { headers: { 'Authorization': `Bearer ${token}` } });
    elections = await res.json();
    const select = document.getElementById('electionSelect');
    select.innerHTML = '';
    elections.forEach(e => {
      const opt = document.createElement('option');
      opt.value = e.id;
      opt.textContent = e.name;
      select.appendChild(opt);
    });
    if (elections.length) {
      currentElectionId = elections[0].id;
      loadPositions();
    }
    select.addEventListener('change', () => {
      currentElectionId = select.value;
      loadPositions();
    });
  }
  async function loadPositions() {
    if (!currentElectionId) return;
    const res = await fetch(`/api/positions?election_id=${currentElectionId}`, { headers: { 'Authorization': `Bearer ${token}` } });
    positions = await res.json();
    const tbody = document.querySelector('#positionTable tbody');
    tbody.innerHTML = '';
    positions.forEach(p => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = p.id;
      row.insertCell(1).innerText = p.title;
      row.insertCell(2).innerText = p.max_seats;
      row.insertCell(3).innerText = p.display_order;
      const cell = row.insertCell(4);
      cell.innerHTML = `<button class="edit" onclick="editPosition(${p.id})">Edit</button>
                        <button class="delete" onclick="deletePosition(${p.id})">Delete</button>`;
    });
  }
  async function savePosition() {
    const id = document.getElementById('positionId').value;
    const data = {
      election_id: currentElectionId,
      title: document.getElementById('title').value,
      max_seats: parseInt(document.getElementById('maxSeats').value),
      display_order: parseInt(document.getElementById('displayOrder').value)
    };
    const url = id ? `/api/positions/${id}` : '/api/positions';
    const method = id ? 'PUT' : 'POST';
    await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(data) });
    closeModal();
    loadPositions();
  }
  async function editPosition(id) {
    const p = positions.find(p => p.id === id);
    document.getElementById('positionId').value = p.id;
    document.getElementById('title').value = p.title;
    document.getElementById('maxSeats').value = p.max_seats;
    document.getElementById('displayOrder').value = p.display_order;
    document.getElementById('modalTitle').innerText = 'Edit Position';
    document.getElementById('modal').style.display = 'flex';
  }
  async function deletePosition(id) {
    if (!confirm('Delete this position?')) return;
    await fetch(`/api/positions/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
    loadPositions();
  }
  function openModal() {
    document.getElementById('positionId').value = '';
    document.getElementById('title').value = '';
    document.getElementById('maxSeats').value = '1';
    document.getElementById('displayOrder').value = '0';
    document.getElementById('modalTitle').innerText = 'Add Position';
    document.getElementById('modal').style.display = 'flex';
  }
  function closeModal() { document.getElementById('modal').style.display = 'none'; }
  loadElections();
</script>
</body>
</html>
