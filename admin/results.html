<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Election Results | Admin</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#f1f5f9; display:flex; }
    .sidebar { width:260px; background:#0038a8; color:white; min-height:100vh; }
    .sidebar-logo { padding:1.5rem; text-align:center; }
    .sidebar-menu a { display:flex; align-items:center; gap:12px; padding:12px 1.5rem; color:#cbd5e1; text-decoration:none; }
    .sidebar-menu a.active { background:rgba(255,255,255,0.2); color:white; }
    .main { flex:1; padding:2rem; }
    .card { background:white; border-radius:16px; padding:2rem; text-align:center; }
    .empty-icon { font-size:80px; margin-bottom:1rem; }

</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><h2>🗳️ VoteSecure PH</h2><p>Admin Panel</p></div>
  <div class="sidebar-menu">
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="voters.html">👥 Voter Management</a>
    <a href="candidates.html">🧑‍💼 Candidates</a>
    <a href="election-setup.html">⚙️ Election Setup</a>
    <a href="results.html" class="active">📈 Results</a>
  </div>
</div>
<div class="main">
  <h1>Election Results</h1>
  <div class="card">
    <div class="empty-icon">🗳️📊</div>

    <p>Results will appear here once voting starts and ballots are submitted.</p>
  </div>
</div>
<script>
  if(!localStorage.getItem('adminToken')) window.location.href='index.html';
</script>

</html>
