<!DOCTYPE html>
<html>
<head><title>Test Backend</title></head>
<body>
<h2>Backend Test</h2>
<button onclick="test()">Test Connection</button>
<pre id="result"></pre>
<script>
async function test() {
  const result = document.getElementById('result');
  result.innerText = 'Testing...';
  try {
    const res = await fetch('http://localhost:3000/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: 'admin@votesecure.ph', password: 'admin123' })
    });
    const data = await res.json();
    result.innerText = 'Success!\n' + JSON.stringify(data, null, 2);
  } catch (err) {
    result.innerText = ' Failed: ' + err.message;
  }
}
</script>
</body>
</html>
