<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voter Management</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#f1f5f9; display:flex; }
    .sidebar { width:240px; background:#0038a8; color:white; min-height:100vh; }
    .sidebar a { display:block; padding:12px 20px; color:#cbd5e1; text-decoration:none; }
    .sidebar a.active { background:#1e3a8a; color:white; }
    .main { flex:1; padding:20px; }
    .card { background:white; border-radius:12px; padding:20px; }
    table { width:100%; border-collapse:collapse; margin-top: 15px; }
    th, td { padding:12px 8px; text-align:left; border-bottom:1px solid #ddd; }
    th { background: #f8fafc; font-weight: 600; }
    .status-pending { background:#fef3c7; color:#92400e; padding:4px 10px; border-radius:20px; font-size: 12px; font-weight: bold; }
    .status-approved { background:#dcfce7; color:#16a34a; padding:4px 10px; border-radius:20px; font-size: 12px; font-weight: bold; }
    button { margin:2px; padding:6px 10px; border:none; border-radius:4px; cursor:pointer; font-weight: 500; }
    .approve { background:#16a34a; color:white; }
    .approve:hover { background:#148a3e; }
    .edit { background:#3b82f6; color:white; }
    .edit:hover { background:#2563eb; }
    .delete { background:#dc2626; color:white; }
    .delete:hover { background:#b91c1c; }
    .tabs button { background:#e2e8f0; border:none; padding:8px 16px; margin-right:8px; cursor:pointer; border-radius: 6px; }
    .tabs button.active { background:#0038a8; color:white; }
    .search { margin:10px 0; padding:8px 12px; width:300px; border: 1px solid #cbd5e1; border-radius: 6px; }

    /* --- MODAL STYLE PARA SA EDIT FORM --- */
    .modal {
      display: none; 
      position: fixed; 
      z-index: 1000; 
      left: 0; top: 0; 
      width: 100%; height: 100%; 
      background-color: rgba(0,0,0,0.5);
      justify-content: center; 
      align-items: center;
    }
    .modal-content {
      background-color: white; 
      padding: 25px; 
      border-radius: 15px; 
      width: 450px; 
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    .modal-header {
      font-size: 18px; font-weight: bold; color: #0038a8; margin-bottom: 15px;
    }
    .modal-form-group { margin-bottom: 12px; }
    .modal-form-group label { display: block; font-size: 12px; font-weight: 600; color: #334155; margin-bottom: 4px; }
    .modal-form-group input, .modal-form-group select {
      width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px;
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .btn-save { background: #16a34a; color: white; padding: 8px 16px; border-radius: 6px; }
    .btn-cancel { background: #94a3b8; color: white; padding: 8px 16px; border-radius: 6px; }
  </style>
</head>
<body>
<div class="sidebar">
  <h2 style="padding:20px;"> VoteSecure</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="voters.html" class="active">Voter Management</a>
  <a href="candidates.html">Candidates</a>
  <a href="election-setup.html">Election Setup</a>
  <a href="positions.html">Positions</a>
  <a href="announcements.html">Announcements</a>
  <a href="results.html">Results</a>
</div>
<div class="main">
  <h1>Voter Management</h1>
  <div class="card">
    <div class="tabs" id="tabs"></div>
    <input type="text" id="search" class="search" placeholder="🔍 Search name or email...">
    <div id="voterList">Loading...</div>
  </div>
</div>

<div id="editModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">✏️ Edit Voter Information</div>
    <input type="hidden" id="editId">
    
    <div class="modal-form-group">
      <label>First Name</label>
      <input type="text" id="editFirst">
    </div>
    <div class="modal-form-group">
      <label>Last Name</label>
      <input type="text" id="editLast">
    </div>
    <div class="modal-form-group">
      <label>Email Address</label>
      <input type="email" id="editEmail">
    </div>
    <div class="modal-form-group">
      <label>Phone Number</label>
      <input type="text" id="editPhone">
    </div>
    <div class="modal-form-group">
      <label>Complete Address</label>
      <input type="text" id="editAddress">
    </div>
    <div class="modal-form-group">
      <label>Status</label>
      <select id="editStatus">
        <option value="pending">PENDING</option>
        <option value="approved">APPROVED</option>
      </select>
    </div>
    
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" onclick="saveVoterEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
  const BASE_URL = 'http://localhost:3000';
  const token = localStorage.getItem('adminToken');
  if (!token) window.location.href = 'index.html';

  let allVoters = [];
  let currentFilter = 'pending';

  // 1. FETCH ALL VOTERS FROM DATABASE
  async function fetchVoters() {
    try {
      const res = await fetch(`${BASE_URL}/api/voters`, { 
        headers: { 'Authorization': `Bearer ${token}` } 
      });
      if (!res.ok) throw new Error();
      allVoters = await res.json();
      render();
    } catch(e) { 
      document.getElementById('voterList').innerHTML = '<p style="color:red; padding:10px;">Error loading voters. Is backend running?</p>'; 
    }
  }

  // 2. RENDER THE VOTERS TABLE
  function render() {
    let filtered = allVoters.filter(v => currentFilter === 'all' ? true : v.status === currentFilter);
    const searchTerm = document.getElementById('search').value.toLowerCase();
    if (searchTerm) {
      filtered = filtered.filter(v => 
        (v.first_name+' '+v.last_name).toLowerCase().includes(searchTerm) || 
        v.email.toLowerCase().includes(searchTerm)
      );
    }
    if (!filtered.length) { 
      document.getElementById('voterList').innerHTML = `<p style="padding:15px; color:#64748b;">No voters found under '${currentFilter}' status.</p>`; 
      return; 
    }

    let html = `<table><thead><tr><th>ID</th><th>Voter ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Address</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
    
    filtered.forEach(v => {
      html += `<tr>
        <td>${v.id}</td>
        <td>${v.voter_id || 'N/A'}</td>
        <td>${v.first_name} ${v.last_name}</td>
        <td>${v.email}</td>
        <td>${v.phone || 'N/A'}</td>
        <td>${v.address || 'N/A'}</td>
        <td><span class="status-${v.status}">${v.status}</span></td>
        <td>
          ${v.status === 'pending' ? `<button class="approve" onclick="approveVoter(${v.id})">Approve</button>` : ''}
          <button class="edit" onclick="openEditModal(${v.id})">Edit</button>
          <button class="delete" onclick="deleteVoter(${v.id})">Delete</button>
        </td>
      </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('voterList').innerHTML = html;
  }

  // 3. APPROVE VOTER
  async function approveVoter(id) {
    if (!confirm('Approve this voter?')) return;
    try {
      await fetch(`${BASE_URL}/api/voters/approve/${id}`, { 
        method: 'PUT', 
        headers: { 'Authorization': `Bearer ${token}` } 
      });
      fetchVoters();
    } catch (err) {
      alert('Failed to approve voter');
    }
  }

  // 4. OPEN EDIT MODAL (Ipasok ang lumang data sa inputs)
  function openEditModal(id) {
    const v = allVoters.find(v => v.id === id);
    if (!v) return;

    document.getElementById('editId').value = v.id;
    document.getElementById('editFirst').value = v.first_name;
    document.getElementById('editLast').value = v.last_name;
    document.getElementById('editEmail').value = v.email;
    document.getElementById('editPhone').value = v.phone || '';
    document.getElementById('editAddress').value = v.address || '';
    document.getElementById('editStatus').value = v.status;

    document.getElementById('editModal').style.display = 'flex';
  }

  // 5. CLOSE MODAL
  function closeEditModal() {
    document.getElementById('editModal').style.display = 'none';
  }

  // 6. SAVE KONTROL SA BACKEND (Dito pinapasa lahat ng kumpletong info)
  async function saveVoterEdit() {
    const id = document.getElementById('editId').value;
    const first_name = document.getElementById('editFirst').value;
    const last_name = document.getElementById('editLast').value;
    const email = document.getElementById('editEmail').value;
    const phone = document.getElementById('editPhone').value;
    const address = document.getElementById('editAddress').value;
    const status = document.getElementById('editStatus').value;

    if (!first_name || !last_name || !email) {
      alert('First Name, Last Name, and Email are required.');
      return;
    }

    try {
      const res = await fetch(`${BASE_URL}/api/voters/${id}`, {
        method: 'PUT',
        headers: { 
          'Content-Type': 'application/json', 
          'Authorization': `Bearer ${token}` 
        },
        body: JSON.stringify({ first_name, last_name, email, phone, address, status })
      });

      if (res.ok) {
        alert('Voter information updated successfully!');
        closeEditModal();
        fetchVoters();
      } else {
        alert('Failed to update voter information.');
      }
    } catch (err) {
      console.error(err);
      alert('Error connecting to backend server.');
    }
  }

  // 7. DELETE VOTER
  async function deleteVoter(id) {
    if (!confirm('⚠️ Are you sure you want to delete this voter permanently?')) return;
    try {
      await fetch(`${BASE_URL}/api/voters/${id}`, { 
        method: 'DELETE', 
        headers: { 'Authorization': `Bearer ${token}` } 
      });
      fetchVoters();
    } catch (err) {
      alert('Failed to delete voter');
    }
  }

  // 8. SETUP TABS
  function setupTabs() {
    const div = document.getElementById('tabs');
    ['pending','approved','all'].forEach(f => {
      const btn = document.createElement('button');
      btn.textContent = f.toUpperCase();
      btn.onclick = () => { 
        currentFilter = f; 
        render(); 
        document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active')); 
        btn.classList.add('active'); 
      };
      if (f === 'pending') btn.classList.add('active');
      div.appendChild(btn);
    });
  }

  document.getElementById('search').addEventListener('input', render);
  setupTabs();
  fetchVoters();
</script>
</body>
</html>
