<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voter Management</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#f1f5f9; display:flex; }
    .sidebar { width:240px; background:#0038a8; color:white; min-height:100vh; }
    .sidebar a { display:block; padding:12px 20px; color:#cbd5e1; text-decoration:none; }
    .sidebar a.active { background:#1e3a8a; color:white; }
    .main { flex:1; padding:20px; }
    .card { background:white; border-radius:12px; padding:20px; margin-bottom:20px; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:8px; text-align:left; border-bottom:1px solid #ddd; }
    button { margin:2px; padding:6px 12px; border:none; border-radius:4px; cursor:pointer; }
    .add { background:#16a34a; color:white; }
    .edit { background:#3b82f6; color:white; }
    .delete { background:#dc2626; color:white; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index: 1000; }
    .modal-content { background:white; padding:20px; border-radius:12px; width:550px; max-height: 90vh; overflow-y: auto; }
    input, select, textarea { width:100%; padding:8px; margin:6px 0; border: 1px solid #ccc; border-radius: 4px; }
    .form-row { display: flex; gap: 10px; }
    .form-group { flex: 1; }
  </style>
</head>
<body>

<div class="sidebar">
  <h2 style="padding:20px;"> VoteSecure</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="voters.html" class="active">Voter Management</a>
  <a href="candidates.html">Candidates</a>
  <a href="election-setup.html">Election Setup</a>
  <a href="positions.html">Positions</a>
  <a href="announcements.html">Announcements</a>
  <a href="results.html">Results</a>
</div>

<div class="main">
  <h1>Voter Management</h1>
  <div class="card">
    <table id="voterTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Full Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="6">Loading voters...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- EDIT/VIEW VOTER MODAL -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3>Edit Voter Details</h3>
    <input type="hidden" id="voterIdField">
    
    <div class="form-row">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" id="firstName">
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" id="lastName">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" disabled style="background:#e2e8f0; color:#64748b;">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="phone">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Birthday</label>
        <input type="date" id="birthday">
      </div>
      <div class="form-group">
        <label>Gender</label>
        <select id="gender">
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>
    </div>

    <label>Home Address</label>
    <textarea id="address" rows="2"></textarea>

    <label>Account Status</label>
    <select id="status">
      <option value="PENDING">PENDING</option>
      <option value="APPROVED">APPROVED</option>
      <option value="REJECTED">REJECTED</option>
    </select>

    <div style="text-align: right; margin-top: 15px;">
      <button class="add" onclick="saveVoterChanges()">Save Changes</button>
      <button onclick="closeEditModal()" style="background:#94a3b8; color:white;">Cancel</button>
    </div>
  </div>
</div>

<script>
  const token = localStorage.getItem('adminToken');
  if (!token) window.location.href = 'index.html';

  // GLOBAL STATE STORAGE: Dito ise-save ang mga voters para maiwasan ang 404 error sa single-fetch.
  let allVoters = [];

  // FETCH ALL VOTERS
  async function fetchVoters() {
    try {
      const res = await fetch('/api/voters', { 
        headers: { 'Authorization': `Bearer ${token}` } 
      });
      const voters = await res.json();
      
      // I-save sa ating local cache variable
      allVoters = voters;

      const tbody = document.querySelector('#voterTable tbody');
      tbody.innerHTML = '';

      if (voters.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No voters registered yet.</td></tr>';
        return;
      }

      voters.forEach(v => {
        const row = tbody.insertRow();
        row.insertCell(0).innerText = v.id;
        
        // Pagsamahin ang pangalan kung hiwalay sa db
        const fullName = v.first_name ? `${v.first_name} ${v.last_name || ''}` : (v.name || 'N/A');
        row.insertCell(1).innerText = fullName;
        row.insertCell(2).innerText = v.email;
        row.insertCell(3).innerText = v.phone || 'N/A';
        row.insertCell(4).innerText = v.status ? v.status.toUpperCase() : 'PENDING';
        
        const cell = row.insertCell(5);
        cell.innerHTML = `
          <button class="edit" onclick="openEditModal(${v.id})">Edit</button>
          <button class="delete" onclick="deleteVoter(${v.id})">Delete</button>
        `;
      });
    } catch (err) {
      console.error("Error loading voters:", err);
      document.querySelector('#voterTable tbody').innerHTML = '<tr><td colspan="6" style="color:red;">Error loading voter dataset.</td></tr>';
    }
  }

  // OPEN EDIT MODAL (FIXED: Kukuha na sa local array imbis na tatawag sa nag-404 na API endpoint)
  function openEditModal(id) {
    // Hanapin ang voter gamit ang local state filter
    const voter = allVoters.find(v => v.id == id);
    
    if (!voter) {
      alert("Error: Voter data cannot be located in local table cache.");
      return;
    }

    // I-populate ang lahat ng modal elements
    document.getElementById('voterIdField').value = voter.id;
    document.getElementById('firstName').value = voter.first_name || (voter.name ? voter.name.split(' ')[0] : '');
    document.getElementById('lastName').value = voter.last_name || (voter.name ? voter.name.split(' ')[1] : '');
    document.getElementById('email').value = voter.email;
    document.getElementById('phone').value = voter.phone || '';
    document.getElementById('address').value = voter.address || '';
    document.getElementById('status').value = voter.status ? voter.status.toUpperCase() : 'PENDING';
    
    if (voter.birthday) {
      document.getElementById('birthday').value = voter.birthday.split('T')[0];
    } else {
      document.getElementById('birthday').value = '';
    }
    
    document.getElementById('gender').value = voter.gender || 'Male';

    // I-display ang modal wrapper
    document.getElementById('editModal').style.display = 'flex';
  }

  // SAVE CHANGES BACK TO DATABASE
  async function saveVoterChanges() {
    const id = document.getElementById('voterIdField').value;
    const data = {
      first_name: document.getElementById('firstName').value,
      last_name: document.getElementById('lastName').value,
      phone: document.getElementById('phone').value,
      address: document.getElementById('address').value,
      birthday: document.getElementById('birthday').value,
      gender: document.getElementById('gender').value,
      status: document.getElementById('status').value
    };

    try {
      const res = await fetch(`/api/voters/${id}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(data)
      });

      if (res.ok) {
        closeEditModal();
        fetchVoters();
        alert("Voter record updated successfully!");
      } else {
        alert("Server failed to update voter record.");
      }
    } catch (err) {
      console.error("Error updates:", err);
      alert("Network error updating information.");
    }
  }

  // DELETE VOTER RECORD
  async function deleteVoter(id) {
    if (!confirm("Are you sure you want to permanently remove this voter account?")) return;
    try {
      const res = await fetch(`/api/voters/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        fetchVoters();
        alert("Voter removed successfully.");
      } else {
        alert("Failed to delete voter record.");
      }
    } catch (err) {
      console.error(err);
    }
  }

  function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

  // Initial execution
  fetchVoters();
</script>
</body>
</html>
