<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voter Management | Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f1f5f9;
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 240px;
      background: #0a1628;
      color: white;
      position: fixed;
      height: 100vh;
    }
    .sidebar-logo { padding: 1.5rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-logo h2 { font-size: 16px; }
    .sidebar-menu { padding: 1rem 0; }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 1.2rem;
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
    }
    .menu-item:hover, .menu-item.active { background: rgba(255,255,255,0.07); color: white; }
    .sidebar-footer { padding: 1rem; border-top: 1px solid rgba(255,255,255,0.1); }
    .btn-logout {
      width: 100%;
      padding: 9px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .main {
      margin-left: 240px;
      flex: 1;
      padding: 2rem;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }
    th {
      background: #f8fafc;
      font-weight: 600;
      color: #0a1628;
    }
    .status-pending {
      background: #fef3c7;
      color: #92400e;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 12px;
      display: inline-block;
    }
    .status-approved {
      background: #dcfce7;
      color: #16a34a;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 12px;
      display: inline-block;
    }
    .status-rejected {
      background: #fee2e2;
      color: #dc2626;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 12px;
      display: inline-block;
    }
    .btn-approve {
      background: #16a34a;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 5px;
    }
    .btn-edit {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 5px;
    }
    .btn-delete {
      background: #dc2626;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-approve:hover { background: #15803d; }
    .btn-edit:hover { background: #2563eb; }
    .btn-delete:hover { background: #b91c1c; }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .tab {
      padding: 8px 20px;
      border: none;
      background: #e2e8f0;
      cursor: pointer;
      border-radius: 8px;
    }
    .tab.active {
      background: #1e3a8a;
      color: white;
    }
    .loading { text-align: center; padding: 20px; color: #64748b; }
    
    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      width: 500px;
      max-width: 90%;
    }
    .modal-content h3 { margin-bottom: 1rem; color: #0a1628; }
    .modal-content input, .modal-content select {
      width: 100%;
      padding: 10px;
      margin-bottom: 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
    }
    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 1rem;
    }
    .modal-buttons button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-save { background: #16a34a; color: white; }
    .btn-cancel { background: #94a3b8; color: white; }
    .search-box {
      margin-bottom: 1rem;
      padding: 8px 12px;
      width: 300px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">
    <div style="font-size:28px;">🗳️</div>
    <h2>VoteSecure PH</h2>
    <p>Admin Panel</p>
  </div>
  <div class="sidebar-menu">
    <a class="menu-item" href="dashboard.html">📊 Dashboard</a>
    <a class="menu-item active" href="voters.html">👥 Voter Management</a>
    <a class="menu-item" href="candidates.html">🧑‍💼 Candidates</a>
    <a class="menu-item" href="election-setup.html">⚙️ Election Setup</a>
    <a class="menu-item" href="results.html">📈 Results</a>
  </div>
  <div class="sidebar-footer">
    <button class="btn-logout" onclick="logout()">🚪 Logout</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div>
      <h1>Voter Management</h1>
      <p id="dateToday"></p>
    </div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="loadVoters('pending')">⏳ Pending Approval</button>
      <button class="tab" onclick="loadVoters('approved')">✅ Approved</button>
      <button class="tab" onclick="loadVoters('rejected')">❌ Rejected</button>
      <button class="tab" onclick="loadVoters('all')">📋 All Voters</button>
    </div>
    <div>
      <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search by name or email..." onkeyup="searchVoters()">
    </div>
    <div id="votersTable">
      <div class="loading">Loading voters...</div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3>✏️ Edit Voter Information</h3>
    <input type="hidden" id="editId">
    <input type="text" id="editFirst" placeholder="First Name">
    <input type="text" id="editLast" placeholder="Last Name">
    <input type="email" id="editEmail" placeholder="Email">
    <input type="text" id="editPhone" placeholder="Phone">
    <input type="text" id="editAddress" placeholder="Address">
    <select id="editStatus">
      <option value="pending">Pending</option>
      <option value="approved">Approved</option>
      <option value="rejected">Rejected</option>
    </select>
    <div class="modal-buttons">
      <button class="btn-save" onclick="updateVoter()">💾 Save Changes</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
  const API_URL = 'http://localhost:3000/api';
  let allVoters = [];
  let currentFilter = 'pending';

  // Auth guard
  if (!localStorage.getItem('adminToken') && !localStorage.getItem('adminLoggedIn')) {
    window.location.href = 'index.html';
  }

  document.getElementById('dateToday').textContent = new Date().toLocaleDateString('en-PH', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  async function loadVoters(filter = 'pending') {
    currentFilter = filter;
    document.getElementById('votersTable').innerHTML = '<div class="loading">Loading voters...</div>';
    
    try {
      const response = await fetch(`${API_URL}/voters`, {
        headers: { 'Authorization': `Bearer ${localStorage.getItem('adminToken')}` }
      });
      allVoters = await response.json();
      
      let filteredVoters = allVoters;
      if (filter === 'pending') {
        filteredVoters = allVoters.filter(v => v.status === 'pending');
      } else if (filter === 'approved') {
        filteredVoters = allVoters.filter(v => v.status === 'approved');
      } else if (filter === 'rejected') {
        filteredVoters = allVoters.filter(v => v.status === 'rejected');
      }
      
      displayVoters(filteredVoters);
      
      // Update tab styles
      document.querySelectorAll('.tab').forEach((tab, idx) => {
        tab.classList.remove('active');
        if ((filter === 'pending' && idx === 0) ||
            (filter === 'approved' && idx === 1) ||
            (filter === 'rejected' && idx === 2) ||
            (filter === 'all' && idx === 3)) {
          tab.classList.add('active');
        }
      });
    } catch (error) {
      document.getElementById('votersTable').innerHTML = '<div class="loading">Error loading voters. Make sure backend is running.</div>';
    }
  }

  function displayVoters(voters) {
    if (voters.length === 0) {
      document.getElementById('votersTable').innerHTML = '<div class="loading">No voters found.</div>';
      return;
    }
    
    let html = `
      <table>
        <thead>
          <tr><th>ID</th><th>Voter ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Status</th><th>Registered</th><th>Actions</th</tr>
        </thead>
        <tbody>
    `;
    
    for (const voter of voters) {
      let statusClass = 'status-pending';
      if (voter.status === 'approved') statusClass = 'status-approved';
      if (voter.status === 'rejected') statusClass = 'status-rejected';
      
      let actions = '';
      if (voter.status === 'pending') {
        actions = `<button class="btn-approve" onclick="approveVoter(${voter.id})">Approve</button>`;
      }
      actions += `<button class="btn-edit" onclick="openEditModal(${voter.id})">Edit</button>`;
      actions += `<button class="btn-delete" onclick="deleteVoter(${voter.id})">Delete</button>`;
      
      html += `
        <tr>
          <td>${voter.id}</td>
          <td>${voter.voter_id || 'N/A'}</td>
          <td>${voter.first_name} ${voter.last_name}</td>
          <td>${voter.email}</td>
          <td>${voter.phone || 'N/A'}</td>
          <td><span class="${statusClass}">${voter.status || 'pending'}</span></td>
          <td>${voter.created_at ? new Date(voter.created_at).toLocaleDateString() : 'N/A'}</td>
          <td>${actions}</td>
        </tr>
      `;
    }
    
    html += `</tbody></table>`;
    document.getElementById('votersTable').innerHTML = html;
  }

  function searchVoters() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allVoters;
    
    if (currentFilter !== 'all') {
      filtered = allVoters.filter(v => v.status === currentFilter);
    }
    
    const searched = filtered.filter(v => 
      v.first_name.toLowerCase().includes(searchTerm) ||
      v.last_name.toLowerCase().includes(searchTerm) ||
      v.email.toLowerCase().includes(searchTerm)
    );
    
    displayVoters(searched);
  }

  async function approveVoter(voterId) {
    if (!confirm('Approve this voter?')) return;
    
    try {
      const response = await fetch(`${API_URL}/voters/approve/${voterId}`, {
        method: 'PUT',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
        }
      });
      
      if (response.ok) {
        alert('✅ Voter approved successfully!');
        loadVoters(currentFilter);
      } else {
        alert('❌ Failed to approve voter');
      }
    } catch (error) {
      alert('❌ Error approving voter');
    }
  }

  function openEditModal(voter) {
    // Find voter from allVoters
    const voterData = allVoters.find(v => v.id === voter);
    if (!voterData) return;
    
    document.getElementById('editId').value = voterData.id;
    document.getElementById('editFirst').value = voterData.first_name;
    document.getElementById('editLast').value = voterData.last_name;
    document.getElementById('editEmail').value = voterData.email;
    document.getElementById('editPhone').value = voterData.phone || '';
    document.getElementById('editAddress').value = voterData.address || '';
    document.getElementById('editStatus').value = voterData.status || 'pending';
    
    document.getElementById('editModal').style.display = 'flex';
  }

  async function updateVoter() {
    const id = document.getElementById('editId').value;
    const data = {
      first_name: document.getElementById('editFirst').value,
      last_name: document.getElementById('editLast').value,
      email: document.getElementById('editEmail').value,
      phone: document.getElementById('editPhone').value,
      address: document.getElementById('editAddress').value,
      status: document.getElementById('editStatus').value
    };
    
    try {
      const response = await fetch(`${API_URL}/voters/${id}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
        },
        body: JSON.stringify(data)
      });
      
      if (response.ok) {
        alert('✅ Voter updated successfully!');
        closeModal();
        loadVoters(currentFilter);
      } else {
        alert('❌ Failed to update voter');
      }
    } catch (error) {
      alert('❌ Error updating voter');
    }
  }

  async function deleteVoter(voterId) {
    if (!confirm('⚠️ Are you sure you want to DELETE this voter? This action cannot be undone!')) return;
    
    try {
      const response = await fetch(`${API_URL}/voters/${voterId}`, {
        method: 'DELETE',
        headers: {
          'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
        }
      });
      
      if (response.ok) {
        alert('✅ Voter deleted successfully!');
        loadVoters(currentFilter);
      } else {
        alert('❌ Failed to delete voter');
      }
    } catch (error) {
      alert('❌ Error deleting voter');
    }
  }

  function closeModal() {
    document.getElementById('editModal').style.display = 'none';
  }

  function logout() {
    if (confirm('Logout?')) {
      localStorage.removeItem('adminToken');
      localStorage.removeItem('adminLoggedIn');
      window.location.href = 'index.html';
    }
  }

  loadVoters('pending');
</script>

</body>
</html>
