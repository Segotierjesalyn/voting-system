<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login | VoteSecure PH</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0038a8 0%, #fcdb30 50%, #ce1126 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      display: flex;
      max-width: 1000px;
      width: 100%;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    }
    /* LEFT SIDE - FLAG */
    .flag-side {
      flex: 1;
      background: linear-gradient(135deg, #0038a8, #002266);
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .ph-flag {
      width: 200px;
      margin-bottom: 20px;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)}
    }
    .flag-side h2 { color: #fcdb30; margin-bottom: 10px; }
    .flag-side p { color: white; font-size: 14px; }
    /* RIGHT SIDE - LOGIN */
    .login-side {
      flex: 1;
      padding: 40px;
      background: white;
    }
    .login-side h1 { color: #0038a8; margin-bottom: 5px; }
    .login-side p { color: #ce1126; margin-bottom: 20px; }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #0038a8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #002266; }
    .error { color: #ce1126; margin-top: 10px; display: none; }
    .success { color: #16a34a; margin-top: 10px; display: none; }
    .hidden { display: none; }
    .checkbox { margin: 10px 0; }
  </style>
</head>
<body>

<div class="login-container">
  <!-- LEFT SIDE - PHILIPPINES FLAG -->
  <div class="flag-side">
    <svg class="ph-flag" viewBox="0 0 1200 600">
      <rect x="0" y="0" width="1200" height="300" fill="#0038a8"/>
      <rect x="0" y="300" width="1200" height="300" fill="#ce1126"/>
      <polygon points="0,0 0,600 450,300" fill="white"/>
      <circle cx="225" cy="300" r="80" fill="#fcdb30"/>
      <polygon points="225,230 232,248 252,248 236,260 242,280 225,268 208,280 214,260 198,248 218,248" transform="translate(-90,-50)"/>
      <polygon points="225,230 232,248 252,248 236,260 242,280 225,268 208,280 214,260 198,248 218,248" transform="translate(90,-50)"/>
      <polygon points="225,230 232,248 252,248 236,260 242,280 225,268 208,280 214,260 198,248 218,248" transform="translate(0,60)"/>
    </svg>
    <h2>VoteSecure PH</h2>
    <p>Admin Control Panel</p>
  </div>

  <!-- RIGHT SIDE - LOGIN FORM -->
  <div class="login-side">
    <h1>🔐 Admin Login</h1>
    <p>Authorized Access Only</p>

    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>

    <div id="loginForm">
      <input type="email" id="email" placeholder="Email" value="admin@votesecure.ph">
      <input type="password" id="password" placeholder="Password" value="admin123">
      <div class="checkbox">
        <input type="checkbox" id="remember"> <label>Remember me</label>
      </div>
      <button onclick="login()">Login to Dashboard</button>
    </div>

    <div id="otpForm" class="hidden">
      <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6" style="text-align:center;font-size:24px;">
      <button onclick="verify()">Verify OTP</button>
    </div>
  </div>
</div>

<script>
  let adminId = null;

  async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
    
    try {
      const res = await fetch('http://localhost:3000/api/admin/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      
      if (res.ok) {
        adminId = data.admin_id;
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('otpForm').classList.remove('hidden');
        if (data.otp) document.getElementById('otp').value = data.otp;
        document.getElementById('successMsg').innerHTML = '✅ OTP sent! Check PowerShell.';
        document.getElementById('successMsg').style.display = 'block';
      } else {
        document.getElementById('errorMsg').innerHTML = '❌ ' + (data.error || data.message);
        document.getElementById('errorMsg').style.display = 'block';
      }
    } catch(err) {
      document.getElementById('errorMsg').innerHTML = '❌ Cannot connect to server. Make sure backend is running.';
      document.getElementById('errorMsg').style.display = 'block';
    }
  }

  async function verify() {
    const otp = document.getElementById('otp').value;
    
    try {
      const res = await fetch('http://localhost:3000/api/admin/verify-otp', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ admin_id: adminId, otp: otp })
      });
      const data = await res.json();
      
      if (res.ok) {
        localStorage.setItem('adminToken', data.token);
        localStorage.setItem('adminLoggedIn', 'true');
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('errorMsg').innerHTML = '❌ ' + (data.error || data.message);
        document.getElementById('errorMsg').style.display = 'block';
      }
    } catch(err) {
      document.getElementById('errorMsg').innerHTML = '❌ Connection error';
      document.getElementById('errorMsg').style.display = 'block';
    }
  }
</script>
</body>
</html>
