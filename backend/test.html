<!DOCTYPE html>
<html>
<head><title>Test Login</title></head>
<body>
<h2>🔐 Admin Login Test</h2>
<input type="text" id="email" placeholder="Email" value="admin@votesecure.ph" style="width:300px"><br>
<input type="password" id="pass" placeholder="Password" value="admin123" style="width:300px"><br>
<button onclick="login()">Login</button>
<pre id="result" style="margin-top:20px;background:#f0f0f0;padding:10px"></pre>

<script>
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('pass').value;
  const result = document.getElementById('result');
  
  result.innerText = 'Loading...';
  
  try {
    // Try to connect to backend
    const res = await fetch('http://localhost:3000/api/admin/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    
    const data = await res.json();
    result.innerText = JSON.stringify(data, null, 2);
    
    if(data.admin_id) {
      result.innerText += '\n\n✅ Login successful! OTP sent to PowerShell.\nEnter OTP in next step...';
    }
  } catch(err) {
    result.innerText = 'ERROR: ' + err.message + '\n\nMake sure backend is running:\ncd backend\nnode server.js';
  }
}
</script>
</body>
</html>
