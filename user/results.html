<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Results | VoteSecure PH</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f1f5f9;
      padding: 20px;
    }
    .container { max-width: 900px; margin: 0 auto; background:white; border-radius:12px; padding:20px; }
    h1 { color:#0038a8; margin-bottom:20px; }
    select { padding:8px; margin-bottom:20px; width:100%; max-width:300px; }
    .position-card { margin-bottom:25px; border:1px solid #e2e8f0; border-radius:8px; overflow:hidden; }
    .position-header { background:#e9ecef; padding:12px; font-weight:bold; font-size:16px; border-left:5px solid #0038a8; }
    .candidate-row { display:flex; justify-content:space-between; padding:10px 15px; border-bottom:1px solid #eee; }
    .candidate-name { font-weight:500; }
    .candidate-votes { font-weight:bold; color:#1e3a8a; }
    .btn-back { background:#cbd5e1; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; margin-top:20px; }
  </style>
</head>
<body>
<div class="container">
  <h1>🗳️ Live Election Results</h1>
  <label>Select Election</label>
  <select id="electionSelect"></select>
  <div id="resultsContainer"></div>
  <button class="btn-back" onclick="window.location.href='dashboard.html'">← Back to Dashboard</button>
</div>
<script>
  const token = localStorage.getItem('voterToken');
  if (!token) window.location.href = 'index.html';

  async function loadElections() {
    const res = await fetch('/api/election');
    const elections = await res.json();
    const select = document.getElementById('electionSelect');
    select.innerHTML = '<option value="">-- Select Election --</option>';
    elections.forEach(e => {
      const opt = document.createElement('option');
      opt.value = e.id;
      opt.textContent = e.name;
      select.appendChild(opt);
    });
    select.addEventListener('change', () => {
      if (select.value) loadResults(select.value);
      else document.getElementById('resultsContainer').innerHTML = '';
    });
  }

  async function loadResults(electionId) {
    const container = document.getElementById('resultsContainer');
    container.innerHTML = '<div>Loading results...</div>';
    try {
      const res = await fetch(/api/results/election/${electionId});
      const data = await res.json();
      if (!data.length) {
        container.innerHTML = '<p>No votes have been cast yet.</p>';
        return;
      }
      let html = '';
      data.forEach(pos => {
        html += `<div class="position-card">
          <div class="position-header">🗳️ ${pos.position}</div>`;
        pos.candidates.forEach(cand => {
          html += `<div class="candidate-row">
            <span class="candidate-name">${cand.name} (${cand.party || 'Independent'})</span>
            <span class="candidate-votes">${cand.vote_count} votes</span>
          </div>`;
        });
        html += </div>;
      });
      container.innerHTML = html;
    } catch (err) {
      container.innerHTML = '<p>Error loading results.</p>';
    }
  }

  loadElections();
</script>
</body>
</html>
